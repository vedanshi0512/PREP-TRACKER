<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CAT 2026 Preparation Tracker — Intelligent study planner with spaced revision">
  <title>CAT 2026 Prep Tracker</title>

  <!-- Fonts: Syne (display) + DM Sans (body) + JetBrains Mono (data) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
  <div id="app">

    <!-- Mobile Header -->
    <header class="mobile-header">
      <button class="hamburger" onclick="App.toggleSidebar()">☰</button>
      <span class="mobile-logo">⚡ CAT 2026</span>
      <span id="mobile-countdown" class="mobile-countdown"></span>
    </header>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-mark">⚡</div>
        <div class="logo-text-wrap">
          <span class="logo-main">CAT 2026</span>
          <span class="logo-sub">Prep Tracker</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section-label">OVERVIEW</div>
        <a href="#" class="nav-item active" data-page="dashboard">
          <span class="nav-icon">🏠</span>
          <span class="nav-label">Dashboard</span>
        </a>
        <a href="#" class="nav-item" data-page="roadmap">
          <span class="nav-icon">🗺️</span>
          <span class="nav-label">Roadmap</span>
        </a>

        <div class="nav-section-label">STUDY</div>
        <a href="#" class="nav-item" data-page="subjects">
          <span class="nav-icon">📚</span>
          <span class="nav-label">Subjects</span>
        </a>
        <a href="#" class="nav-item" data-page="daily-planner">
          <span class="nav-icon">📅</span>
          <span class="nav-label">Daily Planner</span>
        </a>
        <a href="#" class="nav-item" data-page="weekly-planner">
          <span class="nav-icon">🗓️</span>
          <span class="nav-label">Weekly Plan</span>
        </a>

        <div class="nav-section-label">TRACK</div>
        <a href="#" class="nav-item" data-page="mocks">
          <span class="nav-icon">📝</span>
          <span class="nav-label">Mock Tests</span>
        </a>
        <a href="#" class="nav-item" data-page="backlog">
          <span class="nav-icon">⚠️</span>
          <span class="nav-label">Backlog</span>
          <span id="backlog-badge" class="badge-count hidden">0</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <button id="dark-mode-toggle" class="sf-btn">🌙 Dark Mode</button>
        <div class="sf-row">
          <button id="export-btn" class="sf-btn sf-btn-small">⬇️ Export</button>
          <button id="import-btn" class="sf-btn sf-btn-small">⬆️ Import</button>
        </div>
        <input type="file" id="import-file" accept=".json" style="display:none">
        <div class="sidebar-cat-date">
          <span>CAT 2026 — 29 Nov</span>
          <span id="sidebar-days-left" class="days-left-badge">— days</span>
        </div>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main id="main-content" class="main-content">
      <div id="page-content" class="page-inner">
        <!-- Pages rendered dynamically by JS -->
        <div class="initial-loader">
          <div class="loader-ring"></div>
          <div class="loader-text">Loading CAT Prep Tracker…</div>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal Overlay -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal" class="modal">
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- ── Scripts (order matters) ── -->
  <script src="assets/js/config.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/planner.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/pages/dashboard.js"></script>
  <script src="assets/js/pages/subjects.js"></script>
  <script src="assets/js/pages/daily-planner.js"></script>
  <script src="assets/js/pages/other-pages.js"></script>
  <script src="assets/js/app.js"></script>

  <script>
    // Update mobile countdown + sidebar days left
    function updateCountdown() {
      const catDate = new Date('2026-11-29');
      const today   = new Date();
      const diff    = Math.ceil((catDate - today) / 86400000);
      const el1 = document.getElementById('mobile-countdown');
      const el2 = document.getElementById('sidebar-days-left');
      const txt = diff > 0 ? `${diff}d to CAT` : 'CAT Day!';
      if (el1) el1.textContent = txt;
      if (el2) el2.textContent = diff > 0 ? `${diff} days` : 'CAT Day!';
    }
    updateCountdown();
  </script>
</body>
</html>
